<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Cloud session layer for Antigravity CLI">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>agy-cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Token entry screen -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <h1>agy-cloud</h1>
      <p>Enter your auth token to connect</p>
      <input type="password" id="token-input" placeholder="AUTH_TOKEN" autocomplete="off" spellcheck="false">
      <button id="token-submit">Connect</button>
    </div>
  </div>

  <!-- Session list screen -->
  <div id="sessions-screen" class="screen hidden">
    <header>
      <div class="header-left">
        <h1>agy-cloud</h1>
      </div>
      <div class="header-right">
        <span id="status-text-sessions">connected</span>
        <span id="status-dot-sessions" class="dot connected"></span>
      </div>
    </header>

    <main class="sessions-main">
      <div class="sessions-header">
        <h2>Sessions</h2>
        <button id="new-session-btn" class="btn-new-session">+ New Session</button>
      </div>
      <div id="session-list">
        <!-- Sessions render here -->
      </div>
    </main>
  </div>

  <!-- Main chat screen -->
  <div id="chat-screen" class="screen hidden">
    <header>
      <div class="header-left">
        <button id="back-btn" class="btn-back">← Sessions</button>
        <h1 id="session-title">agy-cloud</h1>
      </div>
      <div class="header-right">
        <span id="status-text">connecting</span>
        <span id="status-dot" class="dot"></span>
      </div>
    </header>

    <main id="messages">
      <!-- Messages render here -->
    </main>

    <footer>
      <div class="input-row">
        <input
          type="text"
          id="msg-input"
          placeholder="Send a message to agy…"
          autocomplete="off"
          spellcheck="false"
          disabled
        >
        <button id="send-btn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
